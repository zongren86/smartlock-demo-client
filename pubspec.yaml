name: smartlockdemo_client
description: SmartLock Demo Client — references SDK via git dependency (no source in project)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # SmartLock BLE SDK — 本地开发副本，方便修改测试
  smartlock_ble_sdk:
    path: ../client_demo_sdk

  # BLE 权限（app 层需声明以触发 Android 权限插件）
  flutter_blue_plus: ^1.32.7
  permission_handler: ^11.3.1

  # 二维码扫描
  mobile_scanner: ^5.2.3

  # HTTP
  dio: ^5.6.0

  # 状态管理
  provider: ^6.1.2

  # 支付
  fluwx: ^5.7.5
  tobias: ^3.2.0

  # 加解密
  pointycastle: ^3.9.1

  # 工具
  shared_preferences: ^2.3.0
  path_provider: ^2.1.4
  open_file: ^3.3.2
  url_launcher: ^6.3.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
